<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <!-- Splash artwork: same flashcards-with-sound-waves mark as the app icon.
         The background colour comes from MauiSplashScreen Color in the .csproj. -->

    <!-- Card behind, tilted, to suggest a stack -->
    <rect x="114" y="156" width="156" height="116" rx="16"
          fill="#ffffff" opacity="0.45" transform="rotate(-10 192 214)" />

    <!-- Front card -->
    <rect x="104" y="176" width="168" height="124" rx="16" fill="#ffffff" />

    <!-- Lines of text on the front card (drawn in the background colour) -->
    <g fill="#1F6F8B">
        <rect x="128" y="204" width="120" height="13" rx="6.5" opacity="0.85" />
        <rect x="128" y="232" width="94"  height="13" rx="6.5" opacity="0.6" />
        <rect x="128" y="260" width="110" height="13" rx="6.5" opacity="0.4" />
    </g>

    <!-- Sound waves radiating from the card -->
    <g fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round">
        <path d="M288 202 a40 40 0 0 1 0 72" />
        <path d="M312 176 a72 72 0 0 1 0 124" />
    </g>
</svg>
